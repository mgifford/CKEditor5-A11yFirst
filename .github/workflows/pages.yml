name: Deploy docs to GitHub Pages

on:
  push:
    branches: [ "a11yfirst-master" ]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Sync CKEditor4 archive into docs
        run: |
          rm -rf docs/CKEditor4
          mkdir -p docs/CKEditor4
          rsync -a --delete CKEditor4/ docs/CKEditor4/
          rsync -a ckeditor.js docs/CKEditor4/
          rsync -a contents.css styles.js docs/CKEditor4/
          rsync -a adapters core lang plugins skins vendor custom docs/CKEditor4/

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
