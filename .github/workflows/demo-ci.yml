name: CKEditor5 Demo CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'migration/ckeditor5/demo-tests/**'
      - '.github/workflows/demo-ci.yml'
  push:
    branches: [ 'a11yfirst-master' ]
    paths:
      - 'docs/**'
      - 'migration/ckeditor5/demo-tests/**'
      - '.github/workflows/demo-ci.yml'
  workflow_dispatch:

jobs:
  demo-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: migration/ckeditor5/demo-tests/package-lock.json

      - name: Install test dependencies
        working-directory: migration/ckeditor5/demo-tests
        run: npm install

      - name: Verify local CKEditor bundle exists
        run: |
          test -s docs/assets/ckeditor5/ckeditor.classic.41.4.2.js || {
            echo "Missing required local CKEditor bundle: docs/assets/ckeditor5/ckeditor.classic.41.4.2.js"
            echo "Regenerate or restore the local asset before running demo tests."
            exit 1
          }

      - name: Install Playwright browser
        working-directory: migration/ckeditor5/demo-tests
        run: npx playwright install --with-deps chromium

      - name: Run demo interaction + axe tests
        working-directory: migration/ckeditor5/demo-tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: migration/ckeditor5/demo-tests/playwright-report
          if-no-files-found: ignore
