# Lychee link checker configuration
# https://lychee.cli.rs/

# Number of seconds to wait before timeout
timeout = 20

# Maximum number of allowed retries before a link is declared broken
max_retries = 3

# Maximum number of concurrent requests
max_concurrency = 16

# Skip localhost and loopback addresses
skip_missing = false

# Exclude these patterns from link checking
exclude = [
  # Localhost/loopback references only used in development
  "^http://localhost",
  "^http://127\\.0\\.0\\.1",
  # Anchor-only links are internal page references
  "^#",
  # mailto links are not crawlable
  "^mailto:",
  # Ignore about: protocol URLs (e.g. about:blank)
  "^about:",
]

# Accept these HTTP status codes as valid (206 = Partial Content, 429 = Rate Limited)
accept = [200, 206, 429]
